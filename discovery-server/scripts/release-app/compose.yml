# App-only 部署编排（scripts/release-app/compose.yml）
# 用法：docker compose -f scripts/release-app/compose.yml up -d

x-app-common: &app-common
  image: ${APP_IMAGE:-discovery-server:latest}
  env_file: ./.env
  environment:
    ROOT_PATH: ${ROOT_PATH:-}
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=128M
    - /app/logs:size=64M,uid=1000,gid=1000,mode=0755
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9005/health')"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
  volumes:
    - type: bind
      source: ./config
      target: /app/config
      read_only: true
  networks:
    - stage-net

services:
  discovery-server-blue:
    <<: *app-common
    container_name: discovery-server-blue
    # 如需在 GPU 模式下挂载本地模型或 prompt 文件，请按生产约定追加只读 bind mount，
    # 并在 .env 中将 EMBEDDING_MODEL_PATH / PROMPT_FILE_PATH / CLUSTER_PROMPT_FILE_PATH
    # 指向容器内挂载后的绝对路径。

  discovery-server-green:
    <<: *app-common
    container_name: discovery-server-green
    # 如需在 GPU 模式下挂载本地模型或 prompt 文件，请按生产约定追加只读 bind mount，
    # 并在 .env 中将 EMBEDDING_MODEL_PATH / PROMPT_FILE_PATH / CLUSTER_PROMPT_FILE_PATH
    # 指向容器内挂载后的绝对路径。

networks:
  stage-net:
    external: true
    name: stage-net
