repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [--config-file, pyproject.toml]
        exclude: ^(alembic/|tests/)

      - id: mypy-tests
        name: mypy-tests
        entry: uv run mypy
        language: system
        types: [python]
        files: ^tests/
        args: [--config-file, pyproject.toml]

      - id: mypy-strict-coverage
        name: mypy-strict-coverage
        entry: uv run python scripts/check_mypy_strict_coverage.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.9.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
