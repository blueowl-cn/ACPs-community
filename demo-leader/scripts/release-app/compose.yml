services:
  leader:
    container_name: demo-leader
    image: ${LEADER_IMAGE:-demo-leader:latest}
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./leader/config.toml:/app/leader/config.toml:ro
      - ./leader/atr:/app/leader/atr:ro
      - ./leader/scenario:/app/leader/scenario:ro
    expose:
      - "9011"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /app/logs:size=64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9011/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - leader-net

  web-nginx:
    container_name: demo-web-nginx
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-9010}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web_app:/usr/share/nginx/html:ro
    depends_on:
      leader:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - leader-net

networks:
  leader-net:
    name: leader-net
