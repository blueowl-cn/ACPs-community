[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
pythonpath = . tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    crl: marks tests related to CRL functionality
    ocsp: marks tests related to OCSP functionality
    crl_ocsp: marks tests for CRL and OCSP integration
