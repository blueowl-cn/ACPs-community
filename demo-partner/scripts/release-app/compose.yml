services:
  partners:
    container_name: demo-partners
    image: ${PARTNERS_IMAGE:-acps-demo-partners:latest}
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9021:9021"
      - "9022:9022"
      - "9023:9023"
      - "9024:9024"
      - "9025:9025"
    volumes:
      - ./partners/online:/app/partners/online:ro
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /app/logs:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; [socket.create_connection(('localhost', port), timeout=5).close() for port in (9021, 9022, 9023, 9024, 9025)]"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - partner-net

networks:
  partner-net:
    name: partner-net
