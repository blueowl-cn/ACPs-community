# LLM 参数统一通过环境变量提供，避免将真实凭据打包进仓库或发布物。
[llm.fast]
api_key_env = "PARTNER_LLM_FAST_API_KEY"
base_url_env = "PARTNER_LLM_FAST_BASE_URL"
model_env = "PARTNER_LLM_FAST_MODEL"
max_tokens = 512
temperature = 0.2

[llm.default]
api_key_env = "PARTNER_LLM_DEFAULT_API_KEY"
base_url_env = "PARTNER_LLM_DEFAULT_BASE_URL"
model_env = "PARTNER_LLM_DEFAULT_MODEL"
max_tokens = 2048
temperature = 0.6

[server]
host = "0.0.0.0"
port = 9023

[server.mtls]
tls_enabled = true
verify_client = true
# 这里使用的是 Partner 的智能体身份证书，可同时承担服务端 TLS 与对端身份校验。
cert_file = "server.pem"
key_file = "server.key"
ca_file = "trust-bundle.pem"

[rabbitmq]
host = "localhost"
port = 5671
vhost = "acps"

[concurrency]
max_concurrent_tasks = 10

[log]
level = "DEBUG"
