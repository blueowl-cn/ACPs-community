repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
        files: ^acps-cli/
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^acps-cli/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, acps-cli/pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^acps-cli/acps_cli/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --project acps-cli mypy
        language: system
        types: [python]
        files: ^acps-cli/
        args: [--config-file, acps-cli/pyproject.toml]
        exclude: ^acps-cli/tests/

      - id: mypy-tests
        name: mypy-tests
        entry: uv run --project acps-cli mypy
        language: system
        types: [python]
        files: ^acps-cli/tests/
        args: [--config-file, acps-cli/pyproject.toml]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
