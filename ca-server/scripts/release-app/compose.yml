# scripts/release-app/compose.yml — App-only 部署编排
# 用法：docker compose -f scripts/release-app/compose.yml up -d

x-app-common: &app-common
  image: ${APP_IMAGE:-ca-server:latest}
  env_file: ./.env
  environment:
    ROOT_PATH: ${ROOT_PATH:-}
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64M
    - /app/logs:size=64M
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9003/health')"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  stop_grace_period: 30s
  networks:
    - stage-net
  volumes:
    - type: bind
      source: ./config
      target: /app/config
      read_only: true
    - type: bind
      source: ./certs
      target: /app/certs
      read_only: true

services:
  ca-server-blue:
    <<: *app-common
    container_name: ca-server-blue

  ca-server-green:
    <<: *app-common
    container_name: ca-server-green

networks:
  stage-net:
    external: true
    name: stage-net
