# scripts/release-app/compose.yml — mq-auth-server 部署编排
# 用法：docker compose -f scripts/release-app/compose.yml up -d

x-app-common: &app-common
  image: ${APP_IMAGE:-mq-auth-server:latest}
  env_file: ./.env
  ports:
    - "${MQ_AUTH_PORT:-9007}:9007"
  expose:
    - "9008"
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64M
    - /app/logs:size=64M
  volumes:
    - type: bind
      source: ./config
      target: /app/config
      read_only: true
    - type: bind
      source: ${CERTS_HOST_DIR}
      target: /certs
      read_only: true
  healthcheck:
    test: ["CMD", "python", "-m", "app.core.health_probe", "--url", "https://localhost:9007/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  stop_grace_period: 30s
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 256M
      reservations:
        cpus: "0.1"
        memory: 64M
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
  networks:
    stage-net:
      aliases:
        - mq-auth-server

services:
  mq-auth-server-blue:
    <<: *app-common
    container_name: mq-auth-server-blue

  mq-auth-server-green:
    <<: *app-common
    container_name: mq-auth-server-green

networks:
  stage-net:
    external: true
    name: stage-net
