# 生产部署编排（scripts/release-bundle/compose.yml，发布专用）
# 用法：docker compose -f scripts/release-bundle/compose.yml up -d

x-app-common: &app-common
  image: ${APP_IMAGE:-registry-server:latest}
  env_file: ./.env
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64M
    - /app/logs:size=64M
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - backend
  healthcheck:
    test: ["CMD", "python", "-m", "app.runtime_healthcheck"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  stop_grace_period: 30s

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-9001}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/includes:/etc/nginx/includes:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=64M
      - /run:size=8M
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  registry-server-blue:
    <<: *app-common
    container_name: registry-server-blue
    # 容器内部同时启动 9001 public 与 9002 mTLS listener；当前 Nginx 仅暴露 public HTTP 平面。
    volumes:
      - uploads:/data/uploads

  registry-server-green:
    <<: *app-common
    container_name: registry-server-green
    # 容器内部同时启动 9001 public 与 9002 mTLS listener；当前 Nginx 仅暴露 public HTTP 平面。
    volumes:
      - uploads:/data/uploads

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: ${POSTGRES_INIT_USER:?POSTGRES_INIT_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_INIT_PASSWORD:?POSTGRES_INIT_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_INIT_DB:?POSTGRES_INIT_DB is required}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INIT_USER:?POSTGRES_INIT_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=500"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  pgdata:
  uploads:
