# App-only 部署编排（scripts/release-app/compose.yml）
# 用法：docker compose -f scripts/release-app/compose.yml up -d

x-app-common: &app-common
  image: ${APP_IMAGE:-registry-server:latest}
  env_file: ./.env
  environment:
    ROOT_PATH: ${ROOT_PATH:-}
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64M
    - /app/logs:size=64M
  healthcheck:
    test: ["CMD", "python", "-m", "app.runtime_healthcheck"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  stop_grace_period: 30s
  networks:
    - stage-net
  volumes:
    - uploads:/data/uploads
    - type: bind
      source: ./config
      target: /app/config
      read_only: true
    - type: bind
      source: ${REGISTRY_CERTS_HOST_DIR}
      target: /certs
      read_only: true

services:
  registry-server-blue:
    <<: *app-common
    container_name: registry-server-blue
    # 容器内部同时启动 9001 public 与 9002 mTLS listener。
    # `9001` 始终由 stage-nginx 代理；`9002` 仅在 deploy.sh 判定启用时通过 compose.mtls-publish.yml 绑定宿主机端口。

  registry-server-green:
    <<: *app-common
    container_name: registry-server-green
    # 容器内部同时启动 9001 public 与 9002 mTLS listener。
    # `9001` 始终由 stage-nginx 代理；`9002` 仅在 deploy.sh 判定启用时通过 compose.mtls-publish.yml 绑定宿主机端口。

networks:
  stage-net:
    external: true
    name: stage-net

volumes:
  uploads:
    name: registry-server-uploads
