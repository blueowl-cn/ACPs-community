# Agent CA ACME 客户端配置文件

# CA 服务器基础URL (ATR 规范)
CA_SERVER_BASE_URL=http://localhost:8003/acps-atr-v1

# Challenge 服务器基础URL (ATR 规范)
CHALLENGE_SERVER_BASE_URL=http://localhost:8004/acps-atr-v1

# 联系邮箱 (用于ACME账户注册)
CONTACT_EMAIL=test@example.com

# 私钥长度
KEY_SIZE=2048

# 证书存储目录
CERT_DIR=./certs

# 私钥存储目录 (权限会设置为 700)
PRIVATE_KEY_DIR=./private

# 调试模式 (true/false)
DEBUG=true
