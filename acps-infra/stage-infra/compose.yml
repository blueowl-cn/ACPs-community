name: stage-infra

services:
  nginx:
    container_name: stage-nginx
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    ports:
      - "${NGINX_PORT:-9000}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=64M
      - /run:size=8M
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - stage-net

  postgres:
    container_name: stage-postgres
    image: ${POSTGRES_IMAGE:-acps-stage-postgres:pg17-pgvector}
    environment:
      POSTGRES_USER: ${POSTGRES_INIT_USER:?POSTGRES_INIT_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_INIT_PASSWORD:?POSTGRES_INIT_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_INIT_DB:?POSTGRES_INIT_DB is required}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # 应用数据库凭证，由 docker-entrypoint-initdb.d/01-create-app-databases.sh 使用
      REGISTRY_DB_USER: ${REGISTRY_DB_USER:-registry}
      REGISTRY_DB_PASSWORD: ${REGISTRY_DB_PASSWORD:?REGISTRY_DB_PASSWORD is required}
      REGISTRY_DB_NAME: ${REGISTRY_DB_NAME:-agent_registry}
      CA_DB_USER: ${CA_DB_USER:-ca}
      CA_DB_PASSWORD: ${CA_DB_PASSWORD:?CA_DB_PASSWORD is required}
      CA_DB_NAME: ${CA_DB_NAME:-agent_ca}
      DISCOVERY_DB_USER: ${DISCOVERY_DB_USER:-discovery}
      DISCOVERY_DB_PASSWORD: ${DISCOVERY_DB_PASSWORD:?DISCOVERY_DB_PASSWORD is required}
      DISCOVERY_DB_NAME: ${DISCOVERY_DB_NAME:-agent_discovery}
    volumes:
      - stage-pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INIT_USER:?POSTGRES_INIT_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - stage-net

  redis:
    container_name: stage-redis
    image: ${REDIS_IMAGE:-redis:7-alpine}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --tls-port 6379
      --port 0
      --tls-cert-file /certs/redis-server.pem
      --tls-key-file /certs/redis-server.key
      --tls-ca-cert-file /certs/acps-root-ca.pem
      --tls-auth-clients optional
    volumes:
      - stage-redisdata:/data
      - ./certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli --tls --cacert /certs/acps-root-ca.pem ping | grep -qx PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stage-net

  rabbitmq:
    container_name: stage-rabbitmq
    image: ${RABBITMQ_IMAGE:-rabbitmq:4.2-management-alpine}
    ports:
      - "${RABBITMQ_PORT:-5671}:5671"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - stage-rabbitmqdata:/var/lib/rabbitmq
      - ./certs:/certs:ro
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics check_running && rabbitmq-diagnostics check_port_listener 5671 && rabbitmq-diagnostics check_port_listener 15672",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stage-net

networks:
  stage-net:
    name: ${STAGE_INFRA_NETWORK:-stage-net}
    driver: bridge

volumes:
  stage-pgdata:
  stage-redisdata:
  stage-rabbitmqdata:
