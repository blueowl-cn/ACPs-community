# acps-release/dev-infra/nginx/conf.d/dev-gateway.conf
# 开发环境 API Gateway 配置
# 通过 http://localhost:9000/registry/、/ca-server/、/discovery/ 统一访问各服务
# 仅用于 profiles: [gateway] 场景，日常开发直接访问各服务端口即可

server {
    listen 80;

    location /registry/ {
        rewrite ^/registry(/.*)$ $1 break;
        proxy_pass http://registry-server:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /registry;
    }

    location /ca-server/ {
        rewrite ^/ca-server(/.*)$ $1 break;
        proxy_pass http://ca-server:9003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /ca-server;
    }

    location /discovery/ {
        rewrite ^/discovery(/.*)$ $1 break;
        proxy_pass http://discovery-server:9005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /discovery;
    }

    # 健康检查端点
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
